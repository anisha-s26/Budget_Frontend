<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TRACKER.io</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-body">

    <div class="login-container">
        <div class="card login-card">
            <div class="card-header">Welcome Back</div>
            <div class="card-body">
                <p class="auth-subtitle">Enter your details to access your dashboard.</p>
                
                <label>Email Address</label>
                <input type="email" id="login-email" placeholder="name@company.com">
                
                <label>Password</label>
                <input type="password" id="login-password" placeholder="••••••••">
                
                <button class="btn btn-primary" onclick="handleLogin()">Sign In</button>
                
                <p class="auth-footer">Don't have an account? <a href="#">Create one</a></p>
            </div>
        </div>
    </div>

    <script>
        function handleLogin() {
            // For now, this just redirects to your dashboard
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
